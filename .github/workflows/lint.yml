name: Lint and Format (Ruff)

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ruff
        run: pip install ruff==0.4.2

      - name: Run Ruff Check (Linting)
        run: ruff check .

      - name: Run Ruff Format (Formatting)
        run: ruff format --check .
