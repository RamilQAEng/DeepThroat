name: RAG Quality Gate

on:
  push:
    branches: [main, feat/**]
    paths:
      - "eval/datasets/**"
      - "eval/eval_ragas_metrics.py"
      - "eval/eval_rag_metrics.py"
      - "eval/custom_metrics/**"
      - "eval/config/**"
  pull_request:
    branches: [main]
    paths:
      - "eval/datasets/**"
      - "eval/eval_ragas_metrics.py"
      - "eval/eval_rag_metrics.py"
      - "eval/custom_metrics/**"
      - "eval/config/**"
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset path (relative to eval/)"
        required: false
        default: "datasets/dataset.json"
      threshold:
        description: "Quality gate threshold (0.0–1.0)"
        required: false
        default: "0.70"
      limit:
        description: "Max records to evaluate (0 = all)"
        required: false
        default: "10"

jobs:
  ragas-quality-gate:
    name: RAGAS Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve inputs
        id: inputs
        run: |
          DATASET="${{ github.event.inputs.dataset || 'datasets/dataset.json' }}"
          THRESHOLD="${{ github.event.inputs.threshold || '0.70' }}"
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          echo "dataset=$DATASET" >> $GITHUB_OUTPUT
          echo "threshold=$THRESHOLD" >> $GITHUB_OUTPUT
          echo "limit=$LIMIT" >> $GITHUB_OUTPUT

      - name: Run RAGAS quality gate
        working-directory: eval
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          LIMIT_FLAG=""
          if [ "${{ steps.inputs.outputs.limit }}" != "0" ]; then
            LIMIT_FLAG="--limit ${{ steps.inputs.outputs.limit }}"
          fi

          python eval_ragas_metrics.py \
            "${{ steps.inputs.outputs.dataset }}" \
            $LIMIT_FLAG \
            --fail-below "${{ steps.inputs.outputs.threshold }}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-results-${{ github.run_id }}
          path: eval/results/*_ragas/
          retention-days: 30

  deepeval-quality-gate:
    name: DeepEval Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve inputs
        id: inputs
        run: |
          DATASET="${{ github.event.inputs.dataset || 'datasets/dataset.json' }}"
          THRESHOLD="${{ github.event.inputs.threshold || '0.70' }}"
          echo "dataset=$DATASET" >> $GITHUB_OUTPUT
          echo "threshold=$THRESHOLD" >> $GITHUB_OUTPUT

      - name: Run DeepEval quality gate
        working-directory: eval
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python eval_rag_metrics.py \
            "${{ steps.inputs.outputs.dataset }}" \
            --fail-below "${{ steps.inputs.outputs.threshold }}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-results-${{ github.run_id }}
          path: eval/results/
          exclude: eval/results/*_ragas/
          retention-days: 30
