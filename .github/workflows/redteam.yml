# Temporarily disabled — CI/CD tests paused
# To re-enable: restore 'on:' triggers below

name: LLM Red Team Security Scan

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target profile name from targets.yaml'
        default: 'default'
      simulations:
        description: 'Simulations per attack'
        default: '25'

jobs:
  red-team:
    name: Red Team Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run red team scan
        id: scan
        run: |
          python scripts/run_redteam.py \
            --config config/attack_config.yaml \
            --targets config/targets.yaml \
            --target ${{ github.event.inputs.target || 'default' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redteam-results-${{ github.run_number }}
          path: results/
          retention-days: 90
