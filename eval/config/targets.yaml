targets:
  - name: qwen-72b-or
    provider: openrouter
    model: qwen/qwen-2.5-72b-instruct
    description: "Qwen2.5 72B — рекомендуемый судья (качество/цена)"
    threshold: 0.7

  - name: qwen-235b-or
    provider: openrouter
    model: qwen/qwen3-235b-a22b
    description: "Qwen3 235B MoE — максимальное качество"
    threshold: 0.7

  - name: qwq-32b-or
    provider: openrouter
    model: qwen/qwq-32b
