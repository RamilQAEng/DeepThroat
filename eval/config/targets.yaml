  - name: gpt4o-or
    provider: openrouter
    model: openai/gpt-4o
    description: "GPT-4o — точный"
    threshold: 0.7

  - name: gemini-flash
    provider: openrouter
    model: google/gemini-flash-1.5
    description: "Gemini Flash — дешёвый"
    threshold: 0.7

  - name: gigachat
    provider: gigachat
    model: GigaChat-Pro
    description: "Российская модель-судья"
    threshold: 0.7

  - name: DeepSeek V3.2
    provider: openrouter
    model: deepseek/deepseek-v3.2
    description: "DeepSeek V3.2 — высокое качество"
    threshold: 0.7